<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .invoice-box {
      background: #fff;
      padding: 30px;
      margin: 20px auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 900px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; margin-bottom: 20px; }
    footer { text-align: center; margin-top: 40px; color: #777; }
  </style>
</head>
<body>
  <div class="container">
    <div class="invoice-box">
      <h1>Invoice Generator</h1>
      <form id="invoiceForm">
        <div class="mb-3">
          <label for="logo" class="form-label">Logo Perusahaan</label>
          <input type="file" class="form-control" id="logo" accept="image/*">
        </div>

        <div class="row mb-3">
          <div class="col">
            <label for="invoiceNumber" class="form-label">Invoice #</label>
            <input type="text" class="form-control" id="invoiceNumber" value="INV-1001">
          </div>
          <div class="col">
            <label for="date" class="form-label">Tanggal</label>
            <input type="date" class="form-control" id="date">
          </div>
          <div class="col">
            <label for="dueDate" class="form-label">Jatuh Tempo</label>
            <input type="date" class="form-control" id="dueDate">
          </div>
        </div>

        <div class="mb-3">
          <label for="clientName" class="form-label">Nama Klien</label>
          <input type="text" class="form-control" id="clientName" placeholder="Masukkan nama klien">
        </div>

        <h5>Item</h5>
        <div class="row mb-3">
          <div class="col">
            <label class="form-label">Deskripsi</label>
            <input type="text" class="form-control" id="itemDesc" placeholder="Contoh: Wedding Photography">
          </div>
          <div class="col">
            <label class="form-label">Qty</label>
            <input type="number" class="form-control" id="itemQty" value="1">
          </div>
          <div class="col">
            <label class="form-label">Harga</label>
            <input type="number" class="form-control" id="itemPrice" value="2000">
          </div>
          <div class="col">
            <label class="form-label">Pajak (%)</label>
            <input type="number" class="form-control" id="itemTax" value="10">
          </div>
        </div>

        <button type="button" class="btn btn-primary" onclick="generatePDF()">Download Invoice PDF</button>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2026 Invoice Generator | Dibuat dengan ❤️ untuk UMKM & Freelancer</p>
  </footer>

  <!-- jsPDF untuk generate PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script>
    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // Ambil data form
      const invoiceNumber = document.getElementById("invoiceNumber").value;
      const date = document.getElementById("date").value;
      const dueDate = document.getElementById("dueDate").value;
      const clientName = document.getElementById("clientName").value;
      const itemDesc = document.getElementById("itemDesc").value;
      const itemQty = parseFloat(document.getElementById("itemQty").value);
      const itemPrice = parseFloat(document.getElementById("itemPrice").value);
      const itemTax = parseFloat(document.getElementById("itemTax").value);

      const subtotal = itemQty * itemPrice;
      const taxAmount = subtotal * (itemTax / 100);
      const total = subtotal + taxAmount;

      // Tambahkan logo jika ada
      const logoInput = document.getElementById("logo");
      if (logoInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = function(e) {
          doc.addImage(e.target.result, "PNG", 150, 10, 40, 20);
          renderInvoice(doc, invoiceNumber, date, dueDate, clientName, itemDesc, itemQty, itemPrice, subtotal, taxAmount, total);
        };
        reader.readAsDataURL(logoInput.files[0]);
      } else {
        renderInvoice(doc, invoiceNumber, date, dueDate, clientName, itemDesc, itemQty, itemPrice, subtotal, taxAmount, total);
      }
    }

    function renderInvoice(doc, invoiceNumber, date, dueDate, clientName, itemDesc, itemQty, itemPrice, subtotal, taxAmount, total) {
      doc.setFontSize(18);
      doc.text("INVOICE", 20, 20);

      doc.setFontSize(12);
      doc.text(`Invoice #: ${invoiceNumber}`, 20, 40);
      doc.text(`Tanggal: ${date}`, 20, 50);
      doc.text(`Jatuh Tempo: ${dueDate}`, 20, 60);
      doc.text(`Klien: ${clientName}`, 20, 70);

      doc.text("Detail Item:", 20, 90);
      doc.text(`Deskripsi: ${itemDesc}`, 20, 100);
      doc.text(`Qty: ${itemQty}`, 20, 110);
      doc.text(`Harga: $${itemPrice}`, 20, 120);
      doc.text(`Subtotal: $${subtotal.toFixed(2)}`, 20, 130);
      doc.text(`Pajak: $${taxAmount.toFixed(2)}`, 20, 140);
      doc.text(`Total: $${total.toFixed(2)}`, 20, 150);

      doc.text("Terima kasih atas kepercayaan Anda.", 20, 170);

      doc.save(`invoice-${invoiceNumber}.pdf`);
    }
  </script>
</body>
</html>
