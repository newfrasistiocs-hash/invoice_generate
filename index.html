<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invoice Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#f8f9fa; }
    .invoice-box {
      background:#fff; padding:30px; margin:20px auto; border:1px solid #ddd; border-radius:8px;
      max-width:1100px; box-shadow:0 0 10px rgba(0,0,0,.08);
    }
    h1 { text-align:center; margin-bottom:20px; font-family: Georgia, 'Times New Roman', serif; }
    footer { text-align:center; margin:40px 0 20px; color:#777; }
    table td, table th { vertical-align: middle; }
    .section-title { margin-top: 18px; margin-bottom: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container py-3">
    <div class="invoice-box">
      <h1>Invoice Generator</h1>
      <form id="invoiceForm">
        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label for="companyName" class="form-label">Nama Perusahaan / Toko</label>
            <input type="text" class="form-control" id="companyName" value="Nama Perusahaan Anda">
          </div>
          <div class="col-md-6">
            <label for="logo" class="form-label">Logo Perusahaan</label>
            <input type="file" class="form-control" id="logo" accept="image/*">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-4 mb-3 mb-md-0">
            <label for="invoiceNumber" class="form-label">Invoice #</label>
            <input type="text" class="form-control" id="invoiceNumber" value="INV-1001">
          </div>
          <div class="col-md-4 mb-3 mb-md-0">
            <label for="date" class="form-label">Tanggal</label>
            <input type="date" class="form-control" id="date">
          </div>
          <div class="col-md-4">
            <label for="dueDate" class="form-label">Jatuh Tempo</label>
            <input type="date" class="form-control" id="dueDate">
          </div>
        </div>

        <div class="mb-3">
          <label for="clientName" class="form-label">Nama Klien</label>
          <input type="text" class="form-control" id="clientName" placeholder="Masukkan nama klien">
        </div>

        <div class="row mb-3">
          <div class="col-md-6 mb-3 mb-md-0">
            <label for="bankName" class="form-label">Nama Bank</label>
            <input type="text" class="form-control" id="bankName" placeholder="BCA">
          </div>
          <div class="col-md-6">
            <label for="accountNumber" class="form-label">Nomor Rekening</label>
            <input type="text" class="form-control" id="accountNumber" placeholder="1234567890">
          </div>
        </div>

        <div class="mb-3">
          <label for="issuerName" class="form-label">Nama Pembuat Invoice / TTD</label>
          <input type="text" class="form-control" id="issuerName" placeholder="Nama Anda">
        </div>

        <h5 class="section-title">Daftar Item</h5>
        <div class="table-responsive">
          <table class="table table-bordered" id="itemsTable">
            <thead class="table-light">
              <tr>
                <th>Deskripsi</th>
                <th style="width:110px;">Qty</th>
                <th style="width:160px;">Harga</th>
                <th style="width:130px;">Pajak (%)</th>
                <th style="width:100px;">Aksi</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td><input type="text" class="form-control" value="Wedding Photography"></td>
                <td><input type="number" class="form-control" value="1" min="0"></td>
                <td><input type="number" class="form-control" value="2000" min="0"></td>
                <td><input type="number" class="form-control" value="10" min="0"></td>
                <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Hapus</button></td>
              </tr>
            </tbody>
          </table>
        </div>
        <button type="button" class="btn btn-success mb-3" onclick="addRow()">Tambah Item</button>

        <div class="mb-3">
          <label for="currency" class="form-label">Mata Uang</label>
          <select class="form-select" id="currency">
            <option value="USD" selected>Dollar (USD)</option>
            <option value="IDR">Rupiah (IDR)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="GBP">Pound Sterling (GBP)</option>
            <option value="JPY">Yen (JPY)</option>
            <option value="CNY">Yuan (CNY)</option>
            <option value="AUD">Australian Dollar (AUD)</option>
            <option value="SGD">Singapore Dollar (SGD)</option>
          </select>
        </div>

        <button type="button" class="btn btn-primary" onclick="generatePDF()">Download Invoice PDF</button>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2026 Invoice Generator | Dibuat dengan ❤️ untuk UMKM & Freelancer</p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script>
    function addRow() {
      const table = document.getElementById('itemsTable').getElementsByTagName('tbody')[0];
      const newRow = table.insertRow();
      newRow.innerHTML = `
        <td><input type="text" class="form-control" placeholder="Deskripsi"></td>
        <td><input type="number" class="form-control" value="1" min="0"></td>
        <td><input type="number" class="form-control" value="0" min="0"></td>
        <td><input type="number" class="form-control" value="0" min="0"></td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Hapus</button></td>
      `;
    }

    function removeRow(button) {
      const row = button.closest('tr');
      if (document.querySelectorAll('#itemsTable tbody tr').length > 1) row.remove();
      else alert('Minimal harus ada 1 item.');
    }

    async function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    async function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');

      const companyName = document.getElementById('companyName').value.trim() || 'Nama Perusahaan Anda';
      const invoiceNumber = document.getElementById('invoiceNumber').value.trim() || 'INV-1001';
      const date = formatDate(document.getElementById('date').value);
      const dueDate = formatDate(document.getElementById('dueDate').value);
      const clientName = document.getElementById('clientName').value.trim() || '-';
      const currency = document.getElementById('currency').value;
      const bankName = document.getElementById('bankName').value.trim() || '-';
      const accountNumber = document.getElementById('accountNumber').value.trim() || '-';
      const issuerName = document.getElementById('issuerName').value.trim() || '-';
      const logoFile = document.getElementById('logo').files[0];
      const logoData = await fileToDataURL(logoFile);

      const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const leftX = 18;
      const rightX = pageWidth - 18;

      let subtotal = 0;
      let totalTax = 0;
      const tableData = [];
      const rows = document.querySelectorAll('#itemsTable tbody tr');

      rows.forEach(row => {
        const desc = row.cells[0].querySelector('input').value.trim() || '-';
        const qty = parseFloat(row.cells[1].querySelector('input').value) || 0;
        const price = parseFloat(row.cells[2].querySelector('input').value) || 0;
        const tax = parseFloat(row.cells[3].querySelector('input').value) || 0;
        const lineSubtotal = qty * price;
        const lineTax = lineSubtotal * (tax / 100);
        subtotal += lineSubtotal;
        totalTax += lineTax;
        tableData.push([desc, qty.toString(), formatter.format(price), formatter.format(lineSubtotal), formatter.format(lineTax)]);
      });

      const total = subtotal + totalTax;

      doc.setTextColor(20, 20, 20);
      doc.setFont('Times', 'bold');
      doc.setFontSize(20);
      doc.text(companyName, leftX, 18);
      doc.setDrawColor(180, 180, 180);
      doc.setLineWidth(0.4);
      doc.line(leftX, 22, rightX, 22);

      if (logoData) {
        try { doc.addImage(logoData, 'PNG', rightX - 35, 8, 24, 24); } catch (e) {}
      }

      doc.setFont('Helvetica', 'bold');
      doc.setFontSize(12);
      doc.text(`Invoice #: ${invoiceNumber}`, rightX, 34, { align: 'right' });
      doc.setFont('Helvetica', 'normal');
      doc.text(`Tanggal: ${date}`, rightX, 41, { align: 'right' });
      doc.text(`Jatuh Tempo: ${dueDate}`, rightX, 48, { align: 'right' });
      doc.text(`Klien: ${clientName}`, rightX, 55, { align: 'right' });

      doc.setFont('Helvetica', 'bold');
      doc.setFontSize(11);
      doc.text('Bill To', leftX, 35);
      doc.setFont('Helvetica', 'normal');
      doc.text(clientName, leftX, 42);

      doc.autoTable({
        head: [['Deskripsi', 'Qty', 'Harga', 'Subtotal', 'Pajak']],
        body: tableData,
        startY: 65,
        styles: { fontSize: 10, cellPadding: 3, textColor: [40, 40, 40] },
        headStyles: { fillColor: [41, 128, 185], textColor: [255, 255, 255], halign: 'center' },
        alternateRowStyles: { fillColor: [248, 249, 250] },
        columnStyles: { 1: { halign: 'center' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } }
      });

      let finalY = doc.lastAutoTable.finalY + 10;
      const summaryY = Math.max(finalY, pageHeight - 65);

      doc.setDrawColor(220, 220, 220);
      doc.line(leftX, summaryY - 5, rightX, summaryY - 5);

      doc.setFont('Helvetica', 'normal');
      doc.setFontSize(11);
      doc.text(`Subtotal: ${formatter.format(subtotal)}`, rightX, summaryY, { align: 'right' });
      doc.text(`Total Pajak: ${formatter.format(totalTax)}`, rightX, summaryY + 7, { align: 'right' });
      doc.setFont('Helvetica', 'bold');
      doc.setFontSize(13);
      doc.text(`TOTAL: ${formatter.format(total)}`, rightX, summaryY + 16, { align: 'right' });

      doc.setFont('Helvetica', 'bold');
      doc.setFontSize(11);
      doc.text('Informasi Pembayaran', leftX, summaryY + 2);
      doc.setFont('Helvetica', 'normal');
      doc.text(`Bank: ${bankName}`, leftX, summaryY + 9);
      doc.text(`Rekening: ${accountNumber}`, leftX, summaryY + 16);

      doc.setFont('Times', 'italic');
      doc.text('Terima kasih atas kepercayaan Anda.', leftX, pageHeight - 22);

      doc.setFont('Helvetica', 'normal');
      doc.text('Hormat kami,', rightX, pageHeight - 38, { align: 'right' });
      doc.line(rightX - 55, pageHeight - 20, rightX, pageHeight - 20);
      doc.setFont('Times', 'bold');
      doc.text(issuerName, rightX, pageHeight - 14, { align: 'right' });

      doc.save(`invoice-${invoiceNumber}.pdf`);
    }

    const today = new Date();
    const iso = today.toISOString().split('T')[0];
    document.getElementById('date').value = iso;
    const due = new Date(today);
    due.setDate(due.getDate() + 7);
    document.getElementById('dueDate').value = due.toISOString().split('T')[0];
  </script>
</body>
</html>
