<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Invoice Generator</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .invoice-box {
      background: #fff;
      padding: 30px;
      margin: 20px auto;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-width: 1000px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h1 { text-align: center; margin-bottom: 20px; }
    footer { text-align: center; margin-top: 40px; color: #777; }
  </style>
</head>
<body>
  <div class="container">
    <div class="invoice-box">
      <h1>Invoice Generator</h1>
      <form id="invoiceForm">
        <div class="mb-3">
          <label for="logo" class="form-label">Logo Perusahaan</label>
          <input type="file" class="form-control" id="logo" accept="image/*">
        </div>

        <div class="row mb-3">
          <div class="col">
            <label for="invoiceNumber" class="form-label">Invoice #</label>
            <input type="text" class="form-control" id="invoiceNumber" value="INV-1001">
          </div>
          <div class="col">
            <label for="date" class="form-label">Tanggal</label>
            <input type="date" class="form-control" id="date">
          </div>
          <div class="col">
            <label for="dueDate" class="form-label">Jatuh Tempo</label>
            <input type="date" class="form-control" id="dueDate">
          </div>
        </div>

        <div class="mb-3">
          <label for="clientName" class="form-label">Nama Klien</label>
          <input type="text" class="form-control" id="clientName" placeholder="Masukkan nama klien">
        </div>

        <h5>Daftar Item</h5>
        <table class="table table-bordered" id="itemsTable">
          <thead class="table-light">
            <tr>
              <th>Deskripsi</th>
              <th>Qty</th>
              <th>Harga</th>
              <th>Pajak (%)</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td><input type="text" class="form-control" value="Wedding Photography"></td>
              <td><input type="number" class="form-control" value="1"></td>
              <td><input type="number" class="form-control" value="2000"></td>
              <td><input type="number" class="form-control" value="10"></td>
              <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Hapus</button></td>
            </tr>
          </tbody>
        </table>
        <button type="button" class="btn btn-success mb-3" onclick="addRow()">Tambah Item</button>

        <div class="mb-3">
          <label for="currency" class="form-label">Mata Uang</label>
          <select class="form-select" id="currency">
            <option value="USD" selected>Dollar (USD)</option>
            <option value="IDR">Rupiah (IDR)</option>
            <option value="EUR">Euro (EUR)</option>
            <option value="GBP">Pound Sterling (GBP)</option>
            <option value="JPY">Yen (JPY)</option>
            <option value="CNY">Yuan (CNY)</option>
            <option value="AUD">Australian Dollar (AUD)</option>
            <option value="SGD">Singapore Dollar (SGD)</option>
          </select>
        </div>

        <button type="button" class="btn btn-primary" onclick="generatePDF()">Download Invoice PDF</button>
      </form>
    </div>
  </div>

  <footer>
    <p>© 2026 Invoice Generator | Dibuat dengan ❤️ untuk UMKM & Freelancer</p>
  </footer>

  <!-- jsPDF + autoTable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script>
    function addRow() {
      const table = document.getElementById("itemsTable").getElementsByTagName("tbody")[0];
      const newRow = table.insertRow();
      newRow.innerHTML = `
        <td><input type="text" class="form-control" placeholder="Deskripsi"></td>
        <td><input type="number" class="form-control" value="1"></td>
        <td><input type="number" class="form-control" value="0"></td>
        <td><input type="number" class="form-control" value="0"></td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">Hapus</button></td>
      `;
    }

    function removeRow(button) {
      const row = button.closest("tr");
      row.remove();
    }

    function generatePDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      const invoiceNumber = document.getElementById("invoiceNumber").value;
      const date = document.getElementById("date").value;
      const dueDate = document.getElementById("dueDate").value;
      const clientName = document.getElementById("clientName").value;
      const currency = document.getElementById("currency").value;

      const formatter = new Intl.NumberFormat('id-ID', {
        style: 'currency',
        currency: currency
      });

      let subtotal = 0;
      let totalTax = 0;

      const rows = document.querySelectorAll("#itemsTable tbody tr");
      const tableData = [];

      rows.forEach(row => {
        const desc = row.cells[0].querySelector("input").value;
        const qty = parseFloat(row.cells[1].querySelector("input").value);
        const price = parseFloat(row.cells[2].querySelector("input").value);
        const tax = parseFloat(row.cells[3].querySelector("input").value);

        const lineSubtotal = qty * price;
        const lineTax = lineSubtotal * (tax / 100);
        subtotal += lineSubtotal;
        totalTax += lineTax;

        tableData.push([desc, qty, formatter.format(price), formatter.format(lineSubtotal), formatter.format(lineTax)]);
      });

      const total = subtotal + totalTax;

      // Header
      doc.setFontSize(18);
      doc.text("INVOICE", 105, 20, { align: "center" });

      doc.setFontSize(12);
      doc.text(`Invoice #: ${invoiceNumber}`, 20, 40);
      doc.text(`Tanggal: ${date}`, 20, 50);
      doc.text(`Jatuh Tempo: ${dueDate}`, 20, 60);
      doc.text(`Klien: ${clientName}`, 20, 70);

      // Tabel item
      doc.autoTable({
        head: [['Deskripsi', 'Qty', 'Harga', 'Subtotal', 'Pajak']],
        body: tableData,
        startY: 90,
        styles: { fontSize: 10, halign: 'left' },
        headStyles: { fillColor: [41, 128, 185], textColor: [255,255,255], halign: 'center' },
        columnStyles: { 1: { halign: 'center' }, 2: { halign: 'right' }, 3: { halign: 'right' }, 4: { halign: 'right' } }
      });

      let finalY = doc.lastAutoTable.finalY + 10;
      doc.text(`Subtotal: ${formatter.format(subtotal)}`, 20, finalY);
      doc.text(`Total Pajak: ${formatter.format(totalTax)}`, 20, finalY + 10);
      doc.setFontSize(14);
      doc.text(`TOTAL: ${formatter.format(total)}`, 20, finalY + 25);

      doc.setFontSize(12);
      doc.text("Terima kasih atas kepercayaan Anda.", 20, finalY + 45);

      doc.save(`invoice-${invoiceNumber}.pdf`);
    }
  </script
